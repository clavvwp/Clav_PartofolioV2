<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Creative Works</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <h1 class="loading-logo">CLAV</h1>
            <div class="loading-bar"><div class="loading-progress"></div></div>
            <p class="loading-text">Loading...</p>
        </div>
    </div>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <nav class="navbar" id="navbar">
        <div class="navbar-content">
            <div class="navbar-logo"><a href="index.html">CLAV</a></div>
            <ul class="navbar-menu" id="navbarMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="work.html" class="nav-link">Work</a></li>
                <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
                <li><a href="team.html" class="nav-link">Team</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <button class="mobile-menu-toggle" id="mobileMenuToggle"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <section class="hero" style="min-height: 60vh;">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">Gallery</h1>
                <p class="hero-subtitle">Visual exploration of creative projects and designs</p>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="gallery">
                <div class="gallery-item" style="background: linear-gradient(135deg, #00d9ff, #0099ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #bb00ff, #ff006e);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #00ff88, #00d9ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #ff006e, #00ffff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #00d9ff, #bb00ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #ff00ff, #00ff88);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #0099ff, #bb00ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #00ffff, #ff006e);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #ff006e, #00d9ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #00ff88, #0099ff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #bb00ff, #00ffff);"></div>
                <div class="gallery-item" style="background: linear-gradient(135deg, #ff00ff, #00d9ff);"></div>
            </div>
        </div>
    </section>

    <section class="section text-center">
        <div class="container">
            <h2 class="section-title">Love What You See?</h2>
            <p class="section-subtitle" style="margin-bottom: var(--space-xl);">Let's create something amazing together</p>
            <a href="contact.html" class="cta-button primary-btn">Get in Touch</a>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center; color: var(--text-tertiary);">
                <p>&copy; 2024 Clavin. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
